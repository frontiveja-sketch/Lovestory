<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>恋愛シミュレーション</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="setup-screen" class="screen active">
    <div class="setup-inner">
      <h1>恋愛シミュレーション<span class="star">✦</span></h1>
      <p class="setup-desc">名前を入力して、物語を始めましょう。</p>
      <div class="form-group"><label>あなたの名前</label><input id="player-name" type="text" placeholder="例：タロウ" maxlength="12"></div>
      <div class="form-group">
        <label>相手のキャラクター</label>
        <div class="char-cards">
          <div class="char-card selected" data-char="konuko"><div class="char-card-img-wrap"><img src="assets/konuko_normal.png" alt="こぬ子" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="char-placeholder" style="display:none">🌸</div></div><div class="char-card-name">こぬ子</div><div class="char-card-desc">シャイなオタク気質</div></div>
          <div class="char-card" data-char="shanko"><div class="char-card-img-wrap"><img src="assets/shanko_normal.png" alt="しゃんこ" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="char-placeholder" style="display:none">🔥</div></div><div class="char-card-name">しゃんこ</div><div class="char-card-desc">うるさくて元気</div></div>
          <div class="char-card" data-char="deko"><div class="char-card-img-wrap"><img src="assets/deko_normal.png" alt="デー子" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="char-placeholder" style="display:none">✨</div></div><div class="char-card-name">デー子</div><div class="char-card-desc">落ち着きがない</div></div>
        </div>
      </div>
      <button id="start-btn">ゲームを始める →</button>
    </div>
  </div>
  <div id="game-screen" class="screen">
    <div class="scene"><div class="scene-bg" id="scene-bg"></div><div class="affection-hud"><span class="affection-label">好感度</span><div class="affection-bar"><div class="affection-fill" id="affection-fill"></div></div><span class="affection-value" id="affection-value">0%</span></div><div class="char-name-badge" id="char-name-badge"></div><div class="character-wrap" id="character-wrap"><img id="character-img" src="" alt="" class="character-img"><div id="character-fallback" class="character-fallback"></div></div></div>
    <div class="dialogue-box"><div class="dialogue-speaker" id="dialogue-speaker"></div><div class="dialogue-text" id="dialogue-text"></div><div class="dialogue-loading" id="dialogue-loading"><span></span><span></span><span></span></div></div>
    <div class="choices-area" id="choices-area"></div>
  </div>
  <div id="ending-screen" class="screen"><div class="ending-inner"><div class="ending-heart" id="ending-heart">💕</div><h2 id="ending-title"></h2><p id="ending-desc"></p><div class="ending-affection" id="ending-affection"></div><button id="replay-btn">もう一度プレイ</button></div></div>
  <audio id="bgm" loop preload="auto"></audio>
  <button id="mute-btn" class="mute-btn" title="ミュート切替">🔊</button>
  <script src="local-dialogue.js"></script>
  <script src="audio.js"></script>
  <script src="game.js"></script>
</body>
</html>
